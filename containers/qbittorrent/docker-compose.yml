# qBittorrent routed through gluetun (ProtonVPN, WireGuard).
#
# gluetun owns the network namespace; qBittorrent joins it with
# `network_mode: "service:gluetun"`, so ALL torrent traffic exits through the
# VPN and there is no leak path: if gluetun stops or the tunnel drops,
# qBittorrent loses network entirely (gluetun's built-in kill switch).
#
# Because the two share ONE netns, qBittorrent gets no `ports:`/`networks:` of
# its own — its WebUI is published on the GLUETUN service below instead.
services:
  gluetun:
    image: qmcgaw/gluetun:latest        # use :latest; `docker compose pull` to upgrade
    container_name: gluetun
    hostname: gluetun
    restart: unless-stopped

    # --- security baseline (gluetun needs the tun device + NET_ADMIN) ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN                        # bring up the WireGuard interface
      - DAC_OVERRIDE                     # gluetun creates /tmp/gluetun mode 0644
                                         # (no exec bit) and writes runtime files
                                         # there; under cap_drop ALL even root
                                         # needs DAC_OVERRIDE to write into it,
                                         # else port forwarding aborts.
    devices:
      - /dev/net/tun:/dev/net/tun
    mem_limit: 256m
    pids_limit: 200

    # --- VPN config (secrets/values come from .env, which is gitignored) ---
    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      # ProtonVPN supports VPN-side port forwarding (needs a P2P server +
      # "Moderate NAT" on the WireGuard config). Improves torrent connectivity.
      - VPN_PORT_FORWARDING=${VPN_PORT_FORWARDING}
      - PORT_FORWARD_ONLY=${PORT_FORWARD_ONLY}   # only P2P/port-forward servers
      # On each port assign/renew, gluetun just WRITES the new forwarded port to
      # a shared file; the port-sync sidecar (below) applies it to qBittorrent.
      # A one-shot command can't apply it reliably — it fires before qBittorrent's
      # WebUI is up — so writing the file (instant) + a long-running reconciler is
      # the robust split.
      - "VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'echo {{PORT}} > /portsync/port'"
      # Encrypted DNS over TLS. Cloudflare only: Quad9's DoT (port 853) was
      # reset-by-peer on this ProtonVPN route, breaking tracker resolution.
      # Cloudflare resolves reliably here. (gluetun does DoT, not DoH.)
      - DOT=on
      - DOT_PROVIDERS=cloudflare
      # Let LAN clients reach the qBittorrent WebUI published below; without
      # this, gluetun's firewall drops the return traffic to your LAN.
      - FIREWALL_OUTBOUND_SUBNETS=${LAN_SUBNET}

    # --- networking: qBittorrent's WebUI is published HERE (shared netns) ---
    ports:
      # WEBUI_BIND is "8080" (LAN) or "127.0.0.1:8080" (localhost / behind proxy)
      - "${WEBUI_BIND}:8080"

    # --- storage: gluetun state + the shared file it writes the fwd port to ---
    volumes:
      - ./gluetun:/gluetun
      - ./portsync:/portsync           # gluetun writes {{PORT}} -> /portsync/port

    # --- health: confirms the tunnel is actually up and routing ---
    healthcheck:
      test: ["CMD", "wget", "-qO-", "https://ipinfo.io/ip"]
      interval: 30s
      timeout: 10s
      retries: 5

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest   # use :latest; pull to upgrade
    container_name: qBittorrent

    # No own network — ride entirely on gluetun's netns. This is the kill
    # switch: no gluetun (or no tunnel) == no network for qBittorrent.
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

    # --- security: linuxserver/s6 image; caps intentionally NOT dropped here
    #     (see README Notes — unverified against this image, like omada) ---
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    pids_limit: 400

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080                  # must match the port published on gluetun

    # --- storage: app config + your downloads disk, both bind mounts ---
    volumes:
      - ./config:/config
      - type: bind
        source: ${DOWNLOADS_PATH}
        target: /downloads

  # Keeps qBittorrent's listening port == gluetun's current ProtonVPN forwarded
  # port. Runs in gluetun's netns (so qBittorrent is reachable on localhost:8080)
  # and loops forever, applying /portsync/port whenever it differs — robust to
  # slow startups, reconnects, reboots, and port changes. Needs qBittorrent's
  # "Bypass authentication for localhost" toggle on.
  port-sync:
    image: alpine:latest                 # use :latest; pull to upgrade
    container_name: qbt-port-sync
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 64m
    pids_limit: 50
    volumes:
      - ./portsync:/portsync:ro          # reads the port gluetun writes
      - ./scripts:/scripts:ro            # qbt-port-sync.sh (the reconcile loop)
    command: ["/bin/sh", "/scripts/qbt-port-sync.sh"]
