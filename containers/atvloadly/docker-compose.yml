# IMPORTANT: seccomp:unconfined and the host dbus/avahi mounts are required for
# device pairing — do not remove or tighten them.
services:
  atvloadly:
    image: bitxeno/atvloadly:latest      # upstream ships only :latest; bump via `docker compose pull`
    container_name: atvloadly
    hostname: atvloadly
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined               # required for usbmuxd / device access
    ports:
      - "5533:80"                         # web UI — LAN-wide (needed from other devices)
    volumes:
      - /etc/atvloadly:/data              # ALL persistent state (pairing, Apple ID session,
                                          # app.db, settings) — this is the backup target
      - /var/run/dbus:/var/run/dbus       # host dbus — device discovery
      - /var/run/avahi-daemon:/var/run/avahi-daemon   # host avahi — Bonjour/mDNS discovery
